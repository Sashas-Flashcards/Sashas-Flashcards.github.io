<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry Flashcards — Year 10</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080f0a;
    --card-bg: #0d160f;
    --accent: #00ff88;
    --accent2: #00c4a7;
    --text: #e0ede4;
    --muted: #6b7d70;
    --mastered: #ffe066;
    --border: rgba(0,255,136,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    background-image: radial-gradient(ellipse at 15% 30%, rgba(0,196,167,0.1) 0%, transparent 55%),
                      radial-gradient(ellipse at 85% 70%, rgba(0,255,136,0.07) 0%, transparent 55%);
  }
  header { text-align: center; margin-bottom: 2.5rem; }
  .subject-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 0.3rem 0.8rem;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 0.8rem;
  }
  h1 {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .stats { font-family: 'Space Mono', monospace; font-size: 0.78rem; color: var(--muted); margin-top: 0.5rem; }
  .stats span { color: var(--accent); }
  .scene {
    width: min(480px, 95vw);
    height: 280px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 2rem;
  }
  .card {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(.4,0,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: 16px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem; text-align: center; border: 1px solid var(--border);
  }
  .front { background: var(--card-bg); background-image: linear-gradient(135deg, rgba(0,255,136,0.04), rgba(0,196,167,0.04)); }
  .back { background: linear-gradient(135deg, rgba(0,255,136,0.07), rgba(0,196,167,0.1)); transform: rotateY(180deg); border-color: rgba(0,255,136,0.3); }
  .face-label { font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; position: absolute; top: 1rem; left: 1.2rem; }
  .question-text { font-size: clamp(1rem, 3vw, 1.25rem); font-weight: 600; line-height: 1.5; }
  .answer-text { font-size: clamp(0.9rem, 2.5vw, 1.1rem); line-height: 1.6; color: #b0ffe0; }
  .flip-hint { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: var(--muted); position: absolute; bottom: 1rem; right: 1.2rem; }
  .controls { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; width: min(480px, 95vw); margin-bottom: 2rem; }
  button { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; border: none; border-radius: 8px; padding: 0.75rem 1.4rem; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
  .btn-shuffle { background: transparent; border: 1px solid var(--border); color: var(--accent); flex: 1; }
  .btn-shuffle:hover { background: rgba(0,255,136,0.07); }
  .btn-mastered { background: rgba(255,224,102,0.08); border: 1px solid rgba(255,224,102,0.25); color: var(--mastered); flex: 1; }
  .btn-mastered:hover { background: rgba(255,224,102,0.15); }
  .btn-nav { background: rgba(0,196,167,0.1); border: 1px solid rgba(0,196,167,0.25); color: #80ffe8; flex: 1; }
  .btn-nav:hover { background: rgba(0,196,167,0.2); }
  .btn-reset { background: transparent; border: 1px solid rgba(255,80,80,0.25); color: #ff8080; width: 100%; }
  .btn-reset:hover { background: rgba(255,80,80,0.08); }
  .progress-bar { width: min(480px, 95vw); height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-bottom: 1.5rem; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width 0.4s ease; }
  .mastered-list { width: min(480px, 95vw); margin-top: 1rem; }
  .mastered-list h3 { font-size: 0.7rem; letter-spacing: 0.2em; color: var(--mastered); font-family: 'Space Mono', monospace; text-transform: uppercase; margin-bottom: 0.8rem; }
  .mastered-item { font-size: 0.82rem; color: var(--muted); padding: 0.4rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); display: flex; align-items: center; gap: 0.5rem; }
  .mastered-item::before { content: '✓'; color: var(--mastered); font-size: 0.75rem; }
  .done-msg { text-align: center; padding: 3rem 2rem; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--border); width: min(480px, 95vw); }
  .done-msg h2 { font-size: 1.8rem; color: var(--mastered); margin-bottom: 0.5rem; }
  .done-msg p { color: var(--muted); font-size: 0.9rem; }
</style>
</head>
<body>
<header>
  <div class="subject-tag">Year 10 · Summer Exams</div>
  <h1>🧪 Chemistry</h1>
  <div class="stats">Card <span id="currentNum">1</span> of <span id="totalNum">1</span> remaining</div>
</header>
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div id="mainArea">
  <div class="scene" id="scene" onclick="flipCard()">
    <div class="card" id="card">
      <div class="face front">
        <div class="face-label">Question</div>
        <div class="question-text" id="questionText"></div>
        <div class="flip-hint">click to reveal →</div>
      </div>
      <div class="face back">
        <div class="face-label">Answer</div>
        <div class="answer-text" id="answerText"></div>
        <div class="flip-hint">click to flip back</div>
      </div>
    </div>
  </div>
  <div class="controls">
    <button class="btn-nav" onclick="navigate(-1)">◀ Prev</button>
    <button class="btn-nav" onclick="navigate(1)">Next ▶</button>
    <button class="btn-shuffle" onclick="shuffleCards()">⇄ Shuffle</button>
    <button class="btn-mastered" onclick="markMastered()">✓ Mastered</button>
    <button class="btn-reset" onclick="resetAll()">↺ Reset All Cards</button>
  </div>
</div>
<div class="done-msg" id="doneMsg" style="display:none">
  <h2>🎉 All Mastered!</h2>
  <p>You've mastered all Chemistry cards. Brilliant!</p>
  <button class="btn-reset" style="margin-top:1rem" onclick="resetAll()">↺ Start Again</button>
</div>
<div class="mastered-list" id="masteredList" style="display:none">
  <h3>✓ Mastered Cards</h3>
  <div id="masteredItems"></div>
</div>
<script>
const allCards = [
  {q:"What is an atom?", a:"The smallest particle of an element that retains the chemical properties of that element. Made of protons, neutrons (in nucleus) and electrons (in shells)."},
  {q:"What is the difference between an element, compound and mixture?", a:"Element: one type of atom. Compound: two or more elements chemically bonded. Mixture: substances mixed but not chemically combined, and can be separated."},
  {q:"What are the charges of proton, neutron and electron?", a:"Proton: +1. Neutron: 0 (neutral). Electron: −1. In a neutral atom, protons = electrons."},
  {q:"What is an isotope?", a:"Atoms of the same element with the same number of protons but different numbers of neutrons (different mass numbers). E.g. Carbon-12 and Carbon-14."},
  {q:"What is the periodic table arranged by?", a:"Elements are arranged in order of increasing atomic (proton) number. Elements in the same group have the same number of outer electrons and similar chemical properties."},
  {q:"What are the properties of metals vs non-metals?", a:"Metals: shiny, good conductors, malleable, high melting points. Non-metals: dull, poor conductors (except graphite), brittle, lower melting points."},
  {q:"What is ionic bonding?", a:"Transfer of electrons from metal to non-metal, forming oppositely charged ions that attract each other. Results in a giant ionic lattice structure."},
  {q:"What is covalent bonding?", a:"Sharing of pairs of electrons between non-metal atoms to achieve full outer shells. Can form simple molecular or giant covalent structures."},
  {q:"What is metallic bonding?", a:"A lattice of positive metal ions surrounded by a 'sea' of delocalised electrons. Explains metals' conductivity, malleability and high melting points."},
  {q:"What is the difference between an exothermic and endothermic reaction?", a:"Exothermic: releases energy to surroundings (temperature rises). E.g. combustion, neutralisation. Endothermic: absorbs energy (temperature drops). E.g. thermal decomposition, photosynthesis."},
  {q:"What is a chemical equation and how do you balance one?", a:"A symbolic representation of a reaction. Balance by adjusting coefficients so the number of each atom is equal on both sides. Atoms are conserved."},
  {q:"What is a mole?", a:"A mole is 6.02 × 10²³ particles (Avogadro's number). Moles = mass ÷ relative formula mass (Mr). Used to calculate amounts of substances."},
  {q:"What is the law of conservation of mass?", a:"Mass is neither created nor destroyed in a chemical reaction. The total mass of reactants equals the total mass of products."},
  {q:"What is the reactivity series?", a:"A list of metals in order of reactivity: K, Na, Ca, Mg, Al, Zn, Fe, Sn, Pb, H, Cu, Ag, Au. More reactive metals displace less reactive ones from solutions."},
  {q:"What is oxidation and reduction (OIL RIG)?", a:"OIL RIG: Oxidation Is Loss (of electrons), Reduction Is Gain (of electrons). Oxidation state increases when oxidised."},
  {q:"What are acids, bases and alkalis?", a:"Acid: pH < 7, releases H⁺ ions. Base: substance that neutralises acid. Alkali: soluble base, pH > 7, releases OH⁻ ions. Neutral: pH = 7."},
  {q:"What is neutralisation?", a:"Acid + Base → Salt + Water. E.g. HCl + NaOH → NaCl + H₂O. The H⁺ and OH⁻ ions combine to form water."},
  {q:"What is electrolysis?", a:"Using electricity to decompose an ionic substance. At the cathode (−): positive ions gain electrons (reduction). At the anode (+): negative ions lose electrons (oxidation)."},
  {q:"What is a catalyst?", a:"A substance that increases the rate of reaction without being used up or chemically changed. It lowers the activation energy."},
  {q:"What factors affect the rate of reaction?", a:"Temperature (more collisions/energy), concentration (more particles), surface area (more contact), pressure (gases), and catalysts (lower activation energy)."},
  {q:"What is the collision theory?", a:"Reactions occur when particles collide with sufficient energy (≥ activation energy) and the correct orientation. More frequent, energetic collisions = faster rate."},
  {q:"What is a reversible reaction and what is equilibrium?", a:"A reversible reaction can go in both directions (⇌). At equilibrium, the forward and reverse reaction rates are equal and concentrations remain constant."},
  {q:"What is Le Chatelier's Principle?", a:"If conditions of a system at equilibrium are changed, the equilibrium shifts to oppose that change (e.g. increase pressure → shift to fewer gas moles)."},
  {q:"What is crude oil and how is it separated?", a:"Crude oil is a mixture of hydrocarbons. It is separated by fractional distillation — heating and condensing fractions at different temperatures."},
  {q:"What is cracking in chemistry?", a:"Breaking down long-chain hydrocarbons into shorter, more useful molecules (e.g. alkanes + alkenes) using heat and a catalyst (thermal/catalytic cracking)."},
  {q:"What are alkanes and alkenes?", a:"Alkanes: saturated hydrocarbons, single bonds (CₙH₂ₙ₊₂). Alkenes: unsaturated, contain a C=C double bond (CₙH₂ₙ). Alkenes decolourise bromine water."},
  {q:"What are the products of complete and incomplete combustion?", a:"Complete: hydrocarbon + O₂ → CO₂ + H₂O. Incomplete (limited O₂): produces carbon monoxide (CO), carbon (soot), and water."},
  {q:"What is a polymer and how is it made?", a:"A long chain molecule made from many small repeating units called monomers, joined by addition polymerisation (e.g. ethene → poly(ethene))."},
  {q:"What is the difference between a pure substance and a formulation?", a:"Pure substance: single element or compound with a fixed melting/boiling point. Formulation: a carefully designed mixture (e.g. medicines, alloys, paints)."},
  {q:"What are the tests for common gases?", a:"Hydrogen: 'squeaky pop' with lit splint. Oxygen: relights a glowing splint. CO₂: turns limewater milky. Chlorine: bleaches damp litmus paper."},
  {q:"What is a displacement reaction?", a:"A more reactive metal displaces a less reactive metal from its salt solution. E.g. Zn + CuSO₄ → ZnSO₄ + Cu. The more reactive metal 'takes the place' of the less reactive one."},
  {q:"What is the difference between an atom and an ion?", a:"An atom is neutral (protons = electrons). An ion has lost or gained electrons: cation (+) loses electrons, anion (−) gains electrons."},
  {q:"What is the structure of DNA in chemistry terms?", a:"DNA is a polymer made from nucleotide monomers. Each nucleotide has a sugar, a phosphate group, and a base (A, T, C, G). The two strands form a double helix."},
  {q:"What is chromatography used for?", a:"Separating and identifying mixtures of substances (e.g. inks, food colourings). Rf value = distance moved by substance ÷ distance moved by solvent."},
  {q:"What are nanoparticles and why are they special?", a:"Particles between 1–100 nm in size. Have a very high surface area to volume ratio, giving different properties to bulk materials. Used in medicine, sun cream, electronics."},
];

let deck = [], masteredCards = [], current = 0, isFlipped = false;

function shuffle(arr) { for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }

function init() { deck = shuffle([...allCards]); current = 0; showCard(); }

function showCard() {
  document.getElementById('card').classList.remove('flipped');
  isFlipped = false;
  if (deck.length === 0) {
    document.getElementById('mainArea').style.display='none';
    document.getElementById('doneMsg').style.display='block';
    updateProgress(); return;
  }
  document.getElementById('mainArea').style.display='block';
  document.getElementById('doneMsg').style.display='none';
  document.getElementById('questionText').textContent = deck[current].q;
  document.getElementById('answerText').textContent = deck[current].a;
  document.getElementById('currentNum').textContent = current+1;
  document.getElementById('totalNum').textContent = deck.length;
  updateProgress();
}
function updateProgress() {
  const pct = (masteredCards.length/allCards.length)*100;
  document.getElementById('progressFill').style.width = pct+'%';
  updateMasteredList();
}
function flipCard() { isFlipped=!isFlipped; document.getElementById('card').classList.toggle('flipped',isFlipped); }
function navigate(dir) { current=(current+dir+deck.length)%deck.length; showCard(); }
function shuffleCards() { shuffle(deck); current=0; showCard(); }
function markMastered() {
  if(!deck.length)return;
  masteredCards.push(deck.splice(current,1)[0]);
  if(current>=deck.length)current=Math.max(0,deck.length-1);
  showCard();
}
function resetAll() { masteredCards=[]; deck=shuffle([...allCards]); current=0; document.getElementById('masteredList').style.display='none'; showCard(); }
function updateMasteredList() {
  const list=document.getElementById('masteredList');
  if(!masteredCards.length){list.style.display='none';return;}
  list.style.display='block';
  document.getElementById('masteredItems').innerHTML=masteredCards.map(c=>`<div class="mastered-item">${c.q}</div>`).join('');
}
init();
</script>
</body>
</html>
